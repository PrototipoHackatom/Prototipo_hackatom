{% extends 'base.html' %}
{% block 'content' %}
    <!DOCTYPE html>
<html>
<head>
    <title>Gráficos</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

    <h1>Gráfico de alunos</h1>

    <canvas id="meuGrafico"></canvas>

    <script>

        fetch('/acompanhamento/api/grafico-alunos/')
            .then(response => response.json())
            .then(data => {

                new Chart(
                    document.getElementById('meuGrafico'),
                    {
                        type: 'bar',

                        data: {
                            labels: data.labels,

                            datasets: [{
                                label: 'Quantidade de alunos',
                                data: data.valores,
                            }]
                        }
                    }
                );

            });

    </script>

</body>
</html>
{% endblock %}
